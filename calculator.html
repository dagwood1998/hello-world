<title>Calculator</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background: #f0f2f5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .calc {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
    padding: 20px;
    width: 280px;
  }
  #display {
    width: 100%;
    box-sizing: border-box;
    border: none;
    background: #f0f2f5;
    border-radius: 8px;
    text-align: right;
    font-size: 2rem;
    padding: 12px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .keys {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  button {
    font-size: 1.2rem;
    padding: 14px 0;
    border: none;
    border-radius: 8px;
    background: #e8eaed;
    cursor: pointer;
  }
  button:active { filter: brightness(0.9); }
  .op { background: #ffd8a8; }
  .eq { background: #4dabf7; color: #fff; grid-column: span 2; }
  .clear { background: #ffa8a8; }
</style>

<div class="calc">
  <input id="display" value="0" readonly>
  <div class="keys">
    <button class="clear" data-action="clear">C</button>
    <button data-action="back">⌫</button>
    <button class="op" data-op="/">÷</button>
    <button class="op" data-op="*">×</button>
    <button data-num="7">7</button>
    <button data-num="8">8</button>
    <button data-num="9">9</button>
    <button class="op" data-op="-">−</button>
    <button data-num="4">4</button>
    <button data-num="5">5</button>
    <button data-num="6">6</button>
    <button class="op" data-op="+">+</button>
    <button data-num="1">1</button>
    <button data-num="2">2</button>
    <button data-num="3">3</button>
    <button data-num=".">.</button>
    <button data-num="0">0</button>
    <button class="eq" data-action="equals">=</button>
  </div>
</div>

<script>
  const display = document.getElementById('display');
  let current = '0';
  let previous = null;
  let operator = null;
  let justEvaluated = false;

  function show(value) {
    display.value = String(value).length > 12
      ? Number(value).toPrecision(8).replace(/\.?0+$/, '')
      : value;
  }

  function inputDigit(d) {
    if (justEvaluated) { current = '0'; justEvaluated = false; }
    if (d === '.' && current.includes('.')) return;
    current = current === '0' && d !== '.' ? d : current + d;
    show(current);
  }

  function compute() {
    const a = parseFloat(previous), b = parseFloat(current);
    switch (operator) {
      case '+': return a + b;
      case '-': return a - b;
      case '*': return a * b;
      case '/': return b === 0 ? 'Error' : a / b;
    }
  }

  function setOperator(op) {
    if (operator !== null && !justEvaluated && previous !== null) {
      current = String(compute());
      show(current);
    }
    previous = current;
    operator = op;
    current = '0';
    justEvaluated = false;
  }

  function equals() {
    if (operator === null || previous === null) return;
    current = String(compute());
    show(current);
    previous = null;
    operator = null;
    justEvaluated = true;
  }

  function clearAll() {
    current = '0';
    previous = null;
    operator = null;
    justEvaluated = false;
    show(current);
  }

  function backspace() {
    if (justEvaluated) return;
    current = current.length > 1 ? current.slice(0, -1) : '0';
    show(current);
  }

  document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.num !== undefined) inputDigit(btn.dataset.num);
      else if (btn.dataset.op) setOperator(btn.dataset.op);
      else if (btn.dataset.action === 'equals') equals();
      else if (btn.dataset.action === 'clear') clearAll();
      else if (btn.dataset.action === 'back') backspace();
    });
  });

  document.addEventListener('keydown', e => {
    if (/^[0-9.]$/.test(e.key)) inputDigit(e.key);
    else if (['+', '-', '*', '/'].includes(e.key)) setOperator(e.key);
    else if (e.key === 'Enter' || e.key === '=') equals();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === 'Backspace') backspace();
  });
</script>
